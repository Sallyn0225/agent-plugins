name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Prepare Changesets base branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          git update-ref refs/heads/main refs/remotes/origin/main
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Clean install
        run: npm ci
      - name: Run mandatory quality contract
        run: npm run quality
